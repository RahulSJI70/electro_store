<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login</title>

    <link href="{{ url_for('static', filename='css/bootstrap.min.css') }}" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #f5f7fa, #e4ecf7);
            height: 100vh;
        }

        .login-box {
            max-width: 400px;
            margin: auto;
            margin-top: 80px;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .form-control {
            border-radius: 8px;
            padding: 10px;
        }

        .btn-primary {
            border-radius: 8px;
        }
    </style>
</head>

<body>

<div class="login-box">

    <h3 class="text-center mb-4 fw-bold">Welcome Back 👋</h3>

    <form method="POST">

        <!-- EMAIL -->
        <div class="mb-3">
            <label>Email</label>
            <input type="email" name="email" class="form-control" placeholder="Enter your email" required>
        </div>

        <!-- PASSWORD -->
        <div class="mb-3">
            <label>Password</label>
            <input type="password" name="password" class="form-control" placeholder="Enter password" required>
        </div>

        <!-- BUTTON -->
        <button class="btn btn-primary w-100 mt-2">
            Login
        </button>

    </form>

    <!-- EXTRA -->
    <div class="text-center mt-3">
        <small>Don't have an account? <a href="{{ url_for('signup') }}">Register</a></small>
    </div>

</div>

</body>
</html>
