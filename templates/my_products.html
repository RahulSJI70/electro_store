{% extends "base.html" %}

{% block content %}

<div class="container py-5">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold">My Products</h2>

        <a href="{{ url_for('add_product') }}" class="btn btn-primary rounded-pill">
            ➕ Add Product
        </a>
    </div>

    <div class="row g-4">

        {% for product in products %}

        <div class="col-md-3">
            <div class="card shadow-sm h-100">

             {% if product.images %}
    <img src="{{ url_for('static', filename=product.images[0].image) }}" 
         class="card-img-top p-3" style="height:200px; object-fit:contain;">
{% elif product.image %}
    <img src="{{ url_for('static', filename=product.image) }}" 
         class="card-img-top p-3" style="height:200px; object-fit:contain;">
{% else %}
    <img src="{{ url_for('static', filename='img/default.png') }}" 
         class="card-img-top p-3">
{% endif %}   

                <div class="card-body text-center">

                    <h6>{{ product.name }}</h6>

                    <p class="text-primary fw-bold">
                        ₹{{ product.price }}
                    </p>

                    <div class="d-flex justify-content-center gap-2">

                        <a href="{{ url_for('seller_edit_product', id=product.id) }}" 
                           class="btn btn-sm btn-outline-primary">
                            ✏️ Edit
                        </a>

                        <a href="{{ url_for('delete_product', id=product.id) }}" 
                           class="btn btn-sm btn-outline-danger">
                            🗑 Delete
                        </a>

                    </div>

                </div>

            </div>
        </div>

        {% endfor %}

    </div>

</div>

{% endblock %}
